    pipeline_medalhao:
      name: pipeline_medalhao
      schedule:
        quartz_cron_expression: 0 0 13 * * ?
        timezone_id: America/Recife
        pause_status: UNPAUSED
      tasks:
        - task_key: land_to_bronze
          notebook_task:
            notebook_path: /Workspace/Users/fittipaldisilvio@gmail.com/Atividade de
              Engenharia de Dados/Atividade_land_to_bronze
            source: WORKSPACE
        - task_key: bronze_to_silver
          depends_on:
