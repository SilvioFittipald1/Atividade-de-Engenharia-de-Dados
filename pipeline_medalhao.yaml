          notebook_task:
            notebook_path: /Workspace/Users/fittipaldisilvio@gmail.com/Atividade de
              Engenharia de Dados/Atividade_bronze_to_silver
            source: WORKSPACE
        - task_key: silver_to_gold
          depends_on:
            - task_key: bronze_to_silver
          notebook_task:
            notebook_path: /Workspace/Users/fittipaldisilvio@gmail.com/Atividade de
              Engenharia de Dados/Atividade_silver_to_gold
            source: WORKSPACE
      queue:
        enabled: true
      performance_target: PERFORMANCE_OPTIMIZED
